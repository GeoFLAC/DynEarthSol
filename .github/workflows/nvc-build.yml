name: nvc build

on:
  push:
    branches:
      - "**gpu**"
      - "**GPU**"
      - "**cuda**"
      - "**CUDA**"
    paths-ignore:
      - '**/README.md'
      - '*.md'
      - '*.py'

  pull_request:
    branches:
      - "master"
    paths-ignore:
      - '**/README.md'
      - '*.md'
      - '*.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      docker_changed: ${{ steps.filter.outputs.docker_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker_changed:
              - 'docker/Dockerfile.cuda'

  build-and-push-image:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.docker_changed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo_name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.cuda
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/nvhpc-build-env:latest

          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/nvhpc-build-env:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/nvhpc-build-env:buildcache,mode=max

  nvc-build:
    needs: [detect-changes, build-and-push-image]
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: "2D_All_Targets"
            ndims: 2
          - target_name: "3D_All_Targets"
            ndims: 3

    name: Build ${{ matrix.target_name }}

    container:
      # need lowercase for ghcr.io
      image: ghcr.io/geoflac/dynearthsol/nvhpc-build-env:latest

    steps:
    - uses: actions/checkout@v4

    - name: Fix git safe directory
      run: git config --global --add safe.directory '*'

    - name: Build and Test Targets (${{ matrix.ndims }}D)
      run: |
        export HDF5_INCLUDE_DIR=$(pkg-config --cflags-only-I hdf5-serial | sed 's/-I//g' | tr -d ' ')
        export HDF5_LIB_DIR=$(pkg-config --libs-only-L hdf5-serial | sed 's/-L//g' | tr -d ' ')

        BASE_MAKE="make hdf5=1 NVHPC_DIR=$NVHPC_DIR HDF5_LIB_DIR=$HDF5_LIB_DIR HDF5_INCLUDE_DIR=$HDF5_INCLUDE_DIR"

        echo "=== Building ${{ matrix.ndims }}D OpenACC ==="
        make cleanall && $BASE_MAKE ndims=${{ matrix.ndims }} openacc=1 SM=80

        echo "=== Building ${{ matrix.ndims }}D OpenACC Profiler ==="
        make cleanall && $BASE_MAKE ndims=${{ matrix.ndims }} openacc=1 nprof=1 SM=80

        echo "=== Building ${{ matrix.ndims }}D CPU Debug ==="
        make cleanall && $BASE_MAKE ndims=${{ matrix.ndims }} nprof=1 opt=0