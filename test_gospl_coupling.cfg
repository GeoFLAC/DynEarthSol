[sim]
modelname = gospl_test
max_time_in_yr = 1000
output_step_interval = 10
output_time_interval_in_yr = 100

[mesh]
meshing_option = 90
poly_filename = examples/rifting-2d.poly
xlength = 100e3
ylength = 100e3  
zlength = 30e3
resolution = 10e3
smallest_size = 0.1

[markers]
init_marker_option = 2
init_marker_spacing = 0.5

[control]
ref_pressure_option = 1

[bc]
vbc_x0 = 1
vbc_x1 = 1
vbc_val_x0 = -1e-10
vbc_val_x1 = 1e-10
has_water_loading = no

# GoSPL coupling configuration
use_gospl = yes
gospl_config_file = gospl_test_config.yml
gospl_coupling_interval_in_yr = 100

[ic]
weakzone_option = 0
oceanic_plate_age_in_yr = 50e6

[mat]
rheology_type = elastic
num_materials = 1
rho0 = [ 2800 ]
alpha = [ 3e-5 ]
bulk_modulus = [ 50e9 ]
shear_modulus = [ 30e9 ]
heat_capacity = [ 1000 ]
therm_cond = [ 3.3 ]