# 3D conjugate normal fault system using weakzone_option = 5
#
# Two planar fault segments defined via weakzone_option=5 with
# num_segments=2.  Both segments share a N-S strike (azimuth=0) but dip
# in opposite directions at 60°, forming a conjugate pair typical of
# symmetric rifting.
#
# Segment 1: dips toward -x (azimuth=0,   inclination=60, left half of model)
# Segment 2: dips toward +x (azimuth=180, inclination=60, right half of model)
#
# Pure extension is applied at the X walls; Y walls are free-slip.

[sim]
modelname = result
max_time_in_yr = 5e6
output_time_interval_in_yr = 50000

[mesh]
meshing_option = 1

xlength = 200e3
ylength = 100e3
zlength = 50e3
resolution = 5e3

quality_check_step_interval = 500
remeshing_option = 1
# To prevent remeshing from getting triggered
# by any of the three criteria:
min_quality = 0
smallest_size = 0.0
max_boundary_distortion = 1e30

[control]
ref_pressure_option = 1
dt_fraction = 0.5

[bc]
# Pure extension
vbc_x0 = 1
vbc_x1 = 1
vbc_val_x0 = -3.17e-10
vbc_val_x1 =  3.17e-10

# Free-slip Y walls
vbc_y0 = 1
vbc_y1 = 1
vbc_val_y0 = 0
vbc_val_y1 = 0

# Winkler foundation at base
vbc_n0 = 1
vbc_val_n0 = 0

has_water_loading = no

surface_temperature = 273
mantle_temperature = 1573

[ic]
# Two conjugate planar fault segments
weakzone_option = 5
weakzone_plstrain = 0.5

weakzone_num_segments = 2

# Segment centers (normalized 0-1): placed symmetrically about the model centre
weakzone_segments_xcenter = [0.35, 0.65]
weakzone_segments_ycenter = [0.5,  0.5]
weakzone_segments_zcenter = [0.5,  0.5]

# Opposite dip directions, same 60° dip angle
weakzone_segments_azimuth      = [0,   180]
weakzone_segments_inclination  = [60,  60]
weakzone_segments_halfwidth    = [1.5, 1.5]

# Confine each segment to its own half of the model along x
weakzone_segments_x_min = [0.0, 0.5]
weakzone_segments_x_max = [0.5, 1.0]

# Full y and depth extent
weakzone_segments_y_min     = [0.0, 0.0]
weakzone_segments_y_max     = [1.0, 1.0]
weakzone_segments_depth_min = [0.0, 0.0]
weakzone_segments_depth_max = [1.0, 1.0]

oceanic_plate_age_in_yr = 60e6

[mat]
rheology_type = elasto-visco-plastic
num_materials = 2
rho0 = [2800, 3300]
alpha = [3e-5]
bulk_modulus = [50e9]
shear_modulus = [30e9]
visc_exponent = [3.05]
visc_coefficient = [1.25e-1]
visc_activation_energy = [3.76e5]
heat_capacity = [1000]
therm_cond = [3.3]
pls0 = [0]
pls1 = [0.1]
cohesion0 = [4e7]
cohesion1 = [4e6]
friction_angle0 = [30]
friction_angle1 = [30]
dilation_angle0 = [0]
dilation_angle1 = [0]

max_viscosity = 1e24
min_viscosity = 1e19
