# Rate-and-state friction: creep (aseismic)
# a - b > 0 (velocity strengthening) → stable aseismic creep at plate rate
# "Effect of rate dependence a-b"

[sim]
# output under ep_rsf_creep/ (create dir before run)
modelname = ep_rsf_creep/ep_rsf_creep
max_time_in_yr = 1000

output_time_interval_in_yr = 100
output_step_interval = 100000
earthquake_output_step_interval = 50
earthquake_start_factor = 5.0
earthquake_end_factor = 2.0
seismic_moment_calculate_output = no

has_output_during_remeshing = no
is_outputting_averaged_fields = no

[mesh]
meshing_option = 91
poly_filename = ./rsf_long_strike_model_low_resolution.poly
# poly_filename = ../meshes/three_layer_res_3_100m.poly
meshing_sediment = yes
sediment_size = 2.e1

xlength = 100e3
ylength = 100e3
zlength = 10e3
resolution = 1e2
largest_size = 1.e5
smallest_size = 1.e0
quality_check_step_interval = 10000000

min_angle = 30.
min_quality = 0.2
max_boundary_distortion = 1e0
remeshing_option = 11
is_discarding_internal_segments = yes

[control]
surface_process_option = 1
surface_diffusivity = 1e-20

dt_fraction = 1.0
inertial_scaling = 1e5

has_ATS = true
damping_option = 1
has_moving_mesh = true

[bc]
vbc_x0 = 0
vbc_x1 = 0
vbc_val_x0 = 0
vbc_val_x1 = 0

vbc_y0 = 1
vbc_y1 = 1
vbc_val_y0 = 0
vbc_val_y1 = 0

vbc_z0 = 3
vbc_z1 = 4
vbc_val_z0 = 0
vbc_val_z1 = 1e-9

has_winkler_foundation = false
has_water_loading = no

surface_temperature = 273
mantle_temperature = 273

[ic]
weakzone_plstrain = 0.0

[mat]
# RSF: a=0.006, b=0.003 → a-b = 0.003 (velocity strengthening); Dc = 1e-3 m
rheology_type = elasto-plastic-rsf
num_materials = 5
rho0 = [2700]
alpha = [0]
bulk_modulus = [50e9]
shear_modulus = [30e9]
pls0 = [0]
pls1 = [0.5]
cohesion0 = [1e50, 4.0e6, 4.0e6, 4.0e6, 1e50]
cohesion1 = [1e50, 4.0e6, 4.0e6, 4.0e6, 1e50]
friction_angle0 = [30]
friction_angle1 = [30]
dilation_angle0 = [0]
dilation_angle1 = [0]

direct_a    = [0.006,0.006,0.006,0.006,0.006]   
evolution_b = [0.003,0.003,0.003,0.003,0.003]
characteristic_velocity = [1e-9]
characteristic_distance = [1e-3]
state_var_model = 1

[monitor]
enabled = yes
output_prefix = ep_rsf_creep/monitor
step_interval = 10
num_points = 1
points_x = [50]
points_y = [-4.0]
points_z = []
points_unit = km
remesh_rebind_mode = pre_remesh_coord
write_header = yes
output_coord = yes
output_velocity = yes
# Disabled monitor outputs (default=no). Uncomment when needed.
# output_force = no
# output_temperature = no
# output_pore_pressure = no
# output_bcflag = no
output_stress = yes
# output_strain = no
# output_strain_rate = no
# output_plastic_strain = no
# output_plastic_strain_rate = no
# output_radiogenic_source = no
# output_density = no
# output_mesh_quality = no
# output_viscosity = no
# output_material = no
output_dynamic_friction = yes
output_state_variable = yes

# ----------------------------------------------------------------------
# Option Notes (explicit alternatives for key switches)
# ----------------------------------------------------------------------
# [mat]
# state_var_model:
#   0 = steady-state friction (no state evolution)
#   1 = aging law (used in this file)
#   2 = slip law
#
# rheology_type:
#   elasto-plastic
#   elasto-visco-plastic
#   elasto-plastic-rsf            (used in this file)
#   elasto-visco-plastic-rsf
#
# [control]
# has_ATS:
#   true  = Lapusta-proposed ATS scheme (used here)
#   false = legacy adaptive time-stepping path
#   Note: keep true to match the RSF example setup in this directory.
#
# [sim]
# earthquake_output_step_interval:
#   Step interval used while earthquake mode is active.
# earthquake_start_factor / earthquake_end_factor:
#   Event trigger hysteresis based on max velocity.
# seismic_moment_calculate_output:
#   yes = accumulate/output seismic moment and Mw
#   no  = disabled (used here)
#
# [monitor]
# enabled:
#   yes = write monitor_point_*.csv (used here)
#   no  = no monitoring output
# output_* flags:
#   Toggle each variable family independently.
# points_unit:
#   mm | cm | m | km (km used here)
# remesh_rebind_mode:
#   initial_coord | pre_remesh_coord (pre_remesh_coord used here)
