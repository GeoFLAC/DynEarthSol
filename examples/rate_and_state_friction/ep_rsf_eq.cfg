# Rate-and-state friction: earthquake cycles (stick-slip)
# a - b < 0 (velocity weakening) → periodic earthquakes
# "Effect of rate dependence a-b", strong VW case

[sim]
modelname = ep_rsf_eq/ep_rsf_eq
max_time_in_yr = 1000

output_time_interval_in_yr = 100
output_step_interval = 100000
# Earthquake-mode output cadence and trigger hysteresis.
earthquake_output_step_interval = 500
earthquake_start_factor = 5.0
earthquake_end_factor = 2.0
seismic_moment_calculate_output = no

has_output_during_remeshing = no
is_outputting_averaged_fields = no

[mesh]
meshing_option = 91
poly_filename = ./rsf_long_strike_model_low_resolution.poly
meshing_sediment = yes
sediment_size = 2.e1

xlength = 100e3
ylength = 100e3
zlength = 10e3
resolution = 1e2
largest_size = 1.e5
smallest_size = 1.e0

quality_check_step_interval = 1000000

min_angle = 30.
min_quality = 0.2
max_boundary_distortion = 1e0
remeshing_option = 11
is_discarding_internal_segments = yes

[control]
surface_process_option = 1
surface_diffusivity = 1e-20

dt_fraction = 1.0
inertial_scaling = 1e5

# Keep global velocity scaling enabled for the RSF example setup.
use_global_velocity_scaling = true
damping_option = 1
has_moving_mesh = true

[bc]
vbc_x0 = 0
vbc_x1 = 0
vbc_val_x0 = 0
vbc_val_x1 = 0

vbc_y0 = 1
vbc_y1 = 1
vbc_val_y0 = 0
vbc_val_y1 = 0

vbc_z0 = 3
vbc_z1 = 4
vbc_val_z0 = 0
vbc_val_z1 = 1e-9

has_winkler_foundation = false
has_water_loading = no

surface_temperature = 273
mantle_temperature = 273

[ic]
weakzone_plstrain = 0.0

[mat]
# RSF material with velocity weakening (a - b < 0).
rheology_type = elasto-plastic-rate-state-friction
num_materials = 5
rho0 = [2700]
alpha = [0]
bulk_modulus = [50e9]
shear_modulus = [30e9]
pls0 = [0]
pls1 = [0.5]
cohesion0 = [1e50, 4.0e6, 4.0e6, 4.0e6, 1e50]
cohesion1 = [1e50, 4.0e6, 4.0e6, 4.0e6, 1e50]
friction_angle0 = [30]
friction_angle1 = [30]
dilation_angle0 = [0]
dilation_angle1 = [0]

# Direct effect and state evolution coefficients.
direct_a = [0.003, 0.003, 0.003, 0.003, 0.003]
evolution_b = [0.015, 0.015, 0.015, 0.015, 0.015]
# Reference slip rate and characteristic distance.
characteristic_velocity = [1e-9]
characteristic_distance = [1e-3]
# 1 = aging law.
state_var_model = 1

[monitor]
enabled = yes
output_prefix = ep_rsf_eq/monitor
step_interval = 10
num_points = 1
points_x = [50]
points_y = [-4.0]
points_unit = km
remesh_rebind_mode = pre_remesh_coord
write_header = yes
output_coord = yes
output_velocity = yes
# Stress and RSF diagnostics used by the post-processing script.
output_stress = yes
output_dynamic_friction = yes
output_state_variable = yes
