# 3D oblique rifting (transtension) example using vbc_type = 6
#
# VBC case 6 sets both the fault-normal velocity component (vbc_val_x*)
# and the lateral shear component (vbc_val_x*_l) independently, leaving
# the vertical component free.  This drives oblique extension: the
# ratio val_l / val_x controls the obliquity angle (here ~27°, i.e.
# arctan(0.5/1.0)).
#
# X faces: sinistral oblique extension
#   x0 wall moves at -1 cm/yr (outward) and +0.5 cm/yr (northward)
#   x1 wall moves at +1 cm/yr (outward) and -0.5 cm/yr (southward)
# Y faces: no normal flow (free-slip walls)
# Base:    no vertical flow (Winkler foundation via vbc_n0)
#
# Note on edge nodes (shared by an X face and a Y face):
#   BCs are applied sequentially in loop order: X faces first, then Y faces.
#   For a node on both BOUNDX0 (case 6) and BOUNDY0 (case 1), the Y-face
#   BC overwrites the Y-velocity set by case 6: v[1] is reset to 0.
#   As a result, edge nodes move purely in the X direction with no lateral
#   shear, rather than obliquely.  This affects only the four vertical edges
#   of the box and is expected to have negligible influence on the interior.

[sim]
modelname = result
max_time_in_yr = 0.1e6
output_time_interval_in_yr = 50000

[mesh]
meshing_option = 2

xlength = 200e3
ylength = 100e3
zlength = 50e3
resolution = 5e3
smallest_size = 0.01

refined_zonex = [0.3, 0.7]
refined_zoney = [0.3, 0.7]
refined_zonez = [0.7, 1.0]

quality_check_step_interval = 500
remeshing_option = 11

[control]
ref_pressure_option = 1
dt_fraction = 0.5

[bc]
# Oblique extension: case 6 sets v_normal and v_lateral independently
vbc_x0 = 6
vbc_x1 = 6
vbc_val_x0 = -3.17e-10
vbc_val_x1 =  3.17e-10
vbc_val_x0_l =  1.59e-10
vbc_val_x1_l = -1.59e-10

# Free-slip Y walls (no normal flow)
vbc_y0 = 1
vbc_y1 = 1
vbc_val_y0 = 0
vbc_val_y1 = 0

# Winkler foundation at base
vbc_n0 = 1
vbc_val_n0 = 0

has_water_loading = no

surface_temperature = 273
mantle_temperature = 1573

[ic]
# Single planar weak zone: N-S strike (azimuth=0), 60° dip
weakzone_option = 1
weakzone_azimuth = 0
weakzone_inclination = 60
weakzone_halfwidth = 1.5
weakzone_depth_min = 0.0
weakzone_depth_max = 1.0
weakzone_xcenter = 0.5
weakzone_ycenter = 0.5
weakzone_zcenter = 0.5
weakzone_plstrain = 0.5

oceanic_plate_age_in_yr = 60e6

[mat]
rheology_type = elasto-visco-plastic
num_materials = 2
rho0 = [2800, 3300]
alpha = [3e-5]
bulk_modulus = [50e9]
shear_modulus = [30e9]
visc_exponent = [3.05]
visc_coefficient = [1.25e-1]
visc_activation_energy = [3.76e5]
heat_capacity = [1000]
therm_cond = [3.3]
pls0 = [0]
pls1 = [0.1]
cohesion0 = [4e7]
cohesion1 = [4e6]
friction_angle0 = [30]
friction_angle1 = [30]
dilation_angle0 = [0]
dilation_angle1 = [0]

max_viscosity = 1e24
min_viscosity = 1e19
