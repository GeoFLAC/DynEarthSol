[sim]
modelname = __MODELNAME__
max_steps = __MAX_STEPS__
output_step_interval = __OUTPUT_STEP_INTERVAL__
is_outputting_averaged_fields = no

[mesh]
xlength = 1
ylength = 1
zlength = 1
resolution = 1
quality_check_step_interval = 100
remeshing_option = 0

[control]
gravity = 0
fixed_dt = 1.0
inertial_scaling = 1e5
surface_process_option = 0
has_ATS = true
damping_option = 1

[ic]
weakzone_option = 0

[bc]
vbc_x0 = 1
vbc_x1 = 1
vbc_val_x0 = 0
vbc_val_x1 = 0
vbc_y0 = 1
vbc_y1 = 1
vbc_val_y0 = 0
vbc_val_y1 = 0
vbc_z0 = 1
vbc_z1 = 4
vbc_val_z0 = 0
vbc_val_z1 = 1e-5

surface_temperature = 273
mantle_temperature = 273

[mat]
rheology_type = __RHEOLOGY_TYPE__
is_plane_strain = yes
num_materials = 1

rho0 = [1.0]
alpha = [0]
bulk_modulus = [2.0e8]
shear_modulus = [2.0e8]
pls0 = [0]
pls1 = [0.1]
cohesion0 = [1e6]
cohesion1 = [1e6]
friction_angle0 = [__FRICTION_ANGLE_DEG__]
friction_angle1 = [__FRICTION_ANGLE_DEG__]
dilation_angle0 = [0]
dilation_angle1 = [0]
max_tension = 5.67e6

direct_a = [__DIRECT_A__]
evolution_b = [__EVOLUTION_B__]
characteristic_distance = [__CHARACTERISTIC_DISTANCE__]
characteristic_velocity = [__CHARACTERISTIC_VELOCITY__]
state_var_model = __STATE_VAR_MODEL__

[monitor]
enabled = yes
output_prefix = __MONITOR_PREFIX__
step_interval = __MONITOR_STEP_INTERVAL__
num_points = 2
points_x = [0.3333333333333333, 0.6666666666666666]
points_y = [-0.6666666666666666, -0.3333333333333333]
points_unit = m
remesh_rebind_mode = initial_coord
write_header = yes
output_coord = no
output_velocity = no
output_stress = yes
output_dynamic_friction = yes
output_state_variable = yes
